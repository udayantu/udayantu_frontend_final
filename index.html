    <!-- Boot hardening: prevent Storage (localStorage/sessionStorage) exceptions from crashing app in private/incognito modes -->
    <script>
      (function () {
        function createMemoryStorage() {
          var store = Object.create(null);
          return {
            get length() {
              return Object.keys(store).length;
            },
            key: function (index) {
              try {
                return Object.keys(store)[index] || null;
              } catch (e) {
                return null;
              }
            },
            getItem: function (key) {
              try {
                key = String(key);
                return Object.prototype.hasOwnProperty.call(store, key) ? store[key] : null;
              } catch (e) {
                return null;
              }
            },
            setItem: function (key, value) {
              try {
                store[String(key)] = String(value);
              } catch (e) {
                // ignore
              }
            },
            removeItem: function (key) {
              try {
                delete store[String(key)];
              } catch (e) {
                // ignore
              }
            },
            clear: function () {
              try {
                Object.keys(store).forEach(function (k) {
                  delete store[k];
                });
              } catch (e) {
                // ignore
              }
            },
          };
        }

        function createHybridStorage(nativeStorage) {
          var mem = createMemoryStorage();
          var testKey = "__udayantu_storage_test__";

          function nativeOk() {
            try {
              if (!nativeStorage) return false;
              nativeStorage.setItem(testKey, "1");
              nativeStorage.removeItem(testKey);
              return true;
            } catch (e) {
              return false;
            }
          }

          var canUseNative = nativeOk();

          return {
            get length() {
              try {
                return (canUseNative && nativeStorage ? nativeStorage.length : 0) + mem.length;
              } catch (e) {
                return mem.length;
              }
            },
            key: function (index) {
              // Prefer native keys first, then memory keys
              try {
                if (canUseNative && nativeStorage && index < nativeStorage.length) {
                  return nativeStorage.key(index);
                }
              } catch (e) {
                // ignore
              }
              return mem.key(index);
            },
            getItem: function (key) {
              try {
                if (canUseNative && nativeStorage) {
                  var v = nativeStorage.getItem(key);
                  if (v !== null && v !== undefined) return v;
                }
              } catch (e) {
                // ignore
              }
              return mem.getItem(key);
            },
            setItem: function (key, value) {
              var wroteNative = false;
              try {
                if (canUseNative && nativeStorage) {
                  nativeStorage.setItem(key, value);
                  wroteNative = true;
                }
              } catch (e) {
                wroteNative = false;
              }
              if (!wroteNative) {
                mem.setItem(key, value);
              }
            },
            removeItem: function (key) {
              try {
                if (nativeStorage) nativeStorage.removeItem(key);
              } catch (e) {
                // ignore
              }
              mem.removeItem(key);
            },
            clear: function () {
              try {
                if (nativeStorage) nativeStorage.clear();
              } catch (e) {
                // ignore
              }
              mem.clear();
            },
          };
        }

        function installSafeStorage(propName) {
          var nativeStorage = null;
          try {
            nativeStorage = window[propName];
          } catch (e) {
            nativeStorage = null;
          }

          var safe = createHybridStorage(nativeStorage);

          // Try to replace the global storage object so *any* direct `localStorage` usage (incl. auth client) won't crash.
          try {
            Object.defineProperty(window, propName, {
              value: safe,
              configurable: true,
              enumerable: true,
              writable: false,
            });
          } catch (e) {
            try {
              window[propName] = safe;
            } catch (e2) {
              // ignore
            }
          }
        }

        try {
          installSafeStorage("localStorage");
        } catch (e) {
          // ignore
        }

        try {
          installSafeStorage("sessionStorage");
        } catch (e) {
          // ignore
        }
      })();
    </script>

    <!-- Disable service worker permanently: unregister existing SW + clear caches once, then reload -->
    <script>
      (function () {
        var FLAG = "__udayantu_sw_disabled";

        function hasFlag() {
          try {
            var u = new URL(window.location.href);
            return u.searchParams.get(FLAG) === "1";
          } catch (e) {
            return false;
          }
        }

        function setFlagAndReload() {
          try {
            var u = new URL(window.location.href);
            u.searchParams.set(FLAG, "1");
            u.searchParams.set("__reload", String(Date.now()));
            window.location.replace(u.toString());
          } catch (e) {
            // ignore
          }
        }

        if (hasFlag()) return;

        var hasSW = "serviceWorker" in navigator;
        var hasCaches = "caches" in window;
        if (!hasSW && !hasCaches) return;

        Promise.all([
          hasSW
            ? navigator.serviceWorker.getRegistrations().catch(function () {
                return [];
              })
            : Promise.resolve([]),
          hasCaches
            ? caches.keys().catch(function () {
                return [];
              })
            : Promise.resolve([]),
        ])
          .then(function (results) {
            var regs = results[0] || [];
            var keys = results[1] || [];

            // Only do the reset if we actually have an existing SW registration or caches.
            if (!regs.length && !keys.length) return;

            var tasks = [];
            if (regs.length) {
              tasks.push(
                Promise.all(
                  regs.map(function (r) {
                    try {
                      return r.unregister();
                    } catch (e) {
                      return Promise.resolve(false);
                    }
                  })
                )
              );
            }

            if (keys.length && hasCaches) {
              tasks.push(
                Promise.all(
                  keys.map(function (k) {
                    try {
                      return caches.delete(k);
                    } catch (e) {
                      return Promise.resolve(false);
                    }
                  })
                )
              );
            }

            return Promise.all(tasks).then(function () {
              setFlagAndReload();
            });
          })
          .catch(function () {
            // ignore
          });
      })();
    </script>

  <body>
    <div id="root"></div>

    <!-- Boot recovery: if a cached/stale deploy serves missing JS chunks, recover once -->
    <script>
      (function () {
        const BOOT_TIMEOUT_MS = 12000;
        const RECOVERY_PARAM = "__udayantu_recovered";
        const RELOAD_PARAM = "__reload";

        function isMounted() {
          try {
            if (window.__UDAYANTU_APP_MOUNTED__ === true) return true;
            const root = document.getElementById("root");
            return !!root && root.childNodes && root.childNodes.length > 0;
          } catch {
            return false;
          }
        }

        function hasRecoveredAlready() {
          try {
            const url = new URL(window.location.href);
            return url.searchParams.get(RECOVERY_PARAM) === "1";
          } catch {
            return false;
          }
        }

        async function recoverOnce() {
          if (hasRecoveredAlready()) return;

          try {
            if ("serviceWorker" in navigator) {
              const regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map((r) => r.unregister()));
            }

            if ("caches" in window) {
              const keys = await caches.keys();
              await Promise.all(keys.map((k) => caches.delete(k)));
            }
          } catch {
            // ignore
          } finally {
            const url = new URL(window.location.href);
            url.searchParams.set(RECOVERY_PARAM, "1");
            url.searchParams.set(RELOAD_PARAM, String(Date.now()));
            window.location.replace(url.toString());
          }
        }

        function looksLikeChunkError(message) {
          return /Loading chunk|ChunkLoadError|Failed to fetch dynamically imported module|importing a module script failed/i.test(
            String(message || "")
          );
        }

        window.addEventListener("error", (e) => {
          if (looksLikeChunkError(e && e.message)) recoverOnce();
        });

        window.addEventListener("unhandledrejection", (e) => {
          const reason = e && e.reason;
          const msg = (reason && (reason.message || reason)) || "";
          if (looksLikeChunkError(msg)) recoverOnce();
        });

        window.setTimeout(() => {
          if (!isMounted()) recoverOnce();
        }, BOOT_TIMEOUT_MS);
      })();
    </script>
